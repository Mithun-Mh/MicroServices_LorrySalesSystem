version: '3.8'

services:
  api-gateway:
    build: ./ApiGateway
    ports:
      - "80:80"
    depends_on:
      - inventory-service
      - fleet-service
      - customer-service
      - sales-service
      - finance-service
    networks:
      - lorry-network

  inventory-service:
    build: ./InventoryService
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/inventory_db
    depends_on:
      - mongo
    networks:
      - lorry-network

  fleet-service:
    build: ./FleetService
    ports:
      - "5002:5002"
    environment:
      - MONGO_URI=mongodb://mongo:27017/fleet_db
    depends_on:
      - mongo
    networks:
      - lorry-network

  customer-service:
    build: ./CustomerService
    ports:
      - "5003:5003"
    environment:
      - MONGO_URI=mongodb://mongo:27017/customer_db
    depends_on:
      - mongo
    networks:
      - lorry-network

  sales-service:
    build: ./SalesService
    ports:
      - "5004:5004"
    environment:
      - MONGO_URI=mongodb://mongo:27017/sales_db
    depends_on:
      - mongo
    networks:
      - lorry-network

  finance-service:
    build: ./FinanceService
    ports:
      - "5005:5005"
    environment:
      - MONGO_URI=mongodb://mongo:27017/finance_db
    depends_on:
      - mongo
    networks:
      - lorry-network

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - lorry-network
    volumes:
      - mongo-data:/data/db

networks:
  lorry-network:
    driver: bridge

volumes:
  mongo-data:
